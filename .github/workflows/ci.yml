name: CI

# This is the orchestration repo — it owns docker-compose, the platform README,
# integration/e2e/load tests, the Pulumi IaC, and the sample 834 generator.
# Service + worker + frontend code lives in sibling repos and each has its own CI.
# This workflow only lints + tests the platform-owned Python and validates IaC.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python lint + IaC syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling
        run: pip install ruff httpx pulumi pulumi-gcp
      - name: Ruff
        run: ruff check tests scripts samples pulumi
      - name: Ruff format check
        run: ruff format --check tests scripts samples pulumi
      - name: Pulumi program compiles
        run: python -c "import py_compile; py_compile.compile('pulumi/gcp/__main__.py', doraise=True)"

  security:
    name: Security scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-banner --source=.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
