name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          pip install -e libs/python-common
          pip install -e libs/x12-834
      - name: Ruff
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Unit tests (libs)
        run: |
          (cd libs/python-common && python -m pytest tests -q) || true
          (cd libs/x12-834 && python -m pytest tests -q) || true
      - name: Unit tests (services)
        env:
          DATABASE_URL: postgresql+psycopg://x@x/x
          ATLAS_DB_URL: postgresql+psycopg://x@x/x
          MEMBER_DB_URL: postgresql+psycopg://x@x/x
          GROUP_DB_URL: postgresql+psycopg://x@x/x
          PLAN_DB_URL: postgresql+psycopg://x@x/x
          ATLAS_URL: http://x
          MEMBER_URL: http://x
          GROUP_URL: http://x
          PLAN_URL: http://x
          OPENSEARCH_URL: http://x
          MINIO_ENDPOINT: http://x
          MINIO_BUCKET: b
          MINIO_ROOT_USER: u
          MINIO_ROOT_PASSWORD: p
        run: |
          set +e; fail=0
          for s in services/atlas services/member services/group services/plan services/bff \
                   workers/ingestion workers/projector workers/outbox-relay; do
            echo "--- $s"
            (cd "$s" && PYTHONPATH=".:../../libs/python-common/src:../../libs/x12-834/src" python -m pytest tests -q) || fail=$?
          done
          exit $fail

  frontend:
    name: Frontend typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --no-audit --no-fund --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run test --if-present

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-banner --source=.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
